name: Close pull requests

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "Hi, and thanks for taking the time to contribute!",
              "",
              "This GitHub repository is a **read-only mirror**. The scampi VS Code extension is developed on Codeberg, and pull requests need to be filed there:",
              "",
              "**https://codeberg.org/scampi-dev/vscode-scampi**",
              "",
              "If you're new to Codeberg: it's a non-profit, EU-hosted Forgejo instance. Account creation is free and the workflow is the same as GitHub.",
              "",
              "Sorry for the friction, and sorry I can't accept this PR here. Hope to see you over on Codeberg!",
            ].join("\n");

            const pr = context.payload.pull_request;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: body,
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: "closed",
            });
